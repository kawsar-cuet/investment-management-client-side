<div class="p-6">
  <div class="flex items-center justify-between mb-6">
    <div>
      <button (click)="back()" class="text-sm text-primary-600 hover:text-primary-800 mb-2 inline-flex items-center">
        <svg class="h-4 w-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
        </svg>
        Back to family groups
      </button>
      <h1 class="text-2xl font-semibold text-gray-900">Family Group Details</h1>
    </div>
    <div *ngIf="group && isAdmin && !editing" class="flex space-x-2">
      <button (click)="startEdit()" class="px-4 py-2 bg-primary-600 text-white rounded-md text-sm font-medium hover:bg-primary-700">Edit</button>
      <button (click)="delete()" class="px-4 py-2 bg-red-600 text-white rounded-md text-sm font-medium hover:bg-red-700">Delete</button>
    </div>
  </div>

  <div *ngIf="loading" class="text-gray-600">Loading…</div>
  <div *ngIf="error" class="p-3 mb-4 rounded bg-red-50 text-red-700 border border-red-200">{{ error }}</div>
  <div *ngIf="success" class="p-3 mb-4 rounded bg-green-50 text-green-700 border border-green-200">{{ success }}</div>

  <div *ngIf="group && !editing" class="bg-white rounded-lg shadow border border-gray-200 p-6">
    <dl class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <dt class="text-xs font-medium text-gray-500 uppercase tracking-wide">Group Name</dt>
        <dd class="mt-1 text-gray-900">{{ group.groupName }}</dd>
      </div>
      <div>
        <dt class="text-xs font-medium text-gray-500 uppercase tracking-wide">Status</dt>
        <dd class="mt-1 text-gray-900">{{ group.status || '—' }}</dd>
      </div>
      <div>
        <dt class="text-xs font-medium text-gray-500 uppercase tracking-wide">Description</dt>
        <dd class="mt-1 text-gray-900">{{ group.description || '—' }}</dd>
      </div>
      <div *ngIf="group.createdDate">
        <dt class="text-xs font-medium text-gray-500 uppercase tracking-wide">Created</dt>
        <dd class="mt-1 text-gray-700">{{ group.createdDate | date:'medium' }}</dd>
      </div>
      <div *ngIf="group.updatedDate">
        <dt class="text-xs font-medium text-gray-500 uppercase tracking-wide">Updated</dt>
        <dd class="mt-1 text-gray-700">{{ group.updatedDate | date:'medium' }}</dd>
      </div>
    </dl>
  </div>

  <form *ngIf="group && editing" [formGroup]="editForm" (ngSubmit)="saveEdit()" class="bg-white rounded-lg shadow border border-gray-200 p-6 space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700">Group Name</label>
      <input formControlName="groupName" type="text" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-primary-500 focus:ring-primary-500" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700">Description</label>
      <textarea formControlName="description" rows="3" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-primary-500 focus:ring-primary-500"></textarea>
    </div>
    <div class="flex space-x-2">
      <button type="submit" [disabled]="editForm.invalid" class="px-4 py-2 bg-primary-600 text-white rounded-md text-sm font-medium hover:bg-primary-700 disabled:opacity-50">Save</button>
      <button type="button" (click)="cancelEdit()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-md text-sm font-medium hover:bg-gray-200">Cancel</button>
    </div>
  </form>
</div>
