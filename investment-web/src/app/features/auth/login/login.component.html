<div class="login-container">
  <div class="login-card">
    <!-- Header -->
    <div class="login-header">
      <div class="logo-circle">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1.41 16.09V20h-2.67v-1.93c-1.71-.36-3.16-1.46-3.27-3.4h1.96c.1 1.05.82 1.87 2.65 1.87 1.96 0 2.4-.98 2.4-1.59 0-.83-.44-1.61-2.67-2.14-2.48-.6-4.18-1.62-4.18-3.67 0-1.72 1.39-2.84 3.11-3.21V4h2.67v1.95c1.86.45 2.79 1.86 2.85 3.39H14.3c-.05-1.11-.64-1.87-2.22-1.87-1.5 0-2.4.68-2.4 1.64 0 .84.65 1.39 2.67 1.91s4.18 1.39 4.18 3.91c-.01 1.83-1.38 2.83-3.12 3.16z"/>
        </svg>
      </div>
      <h1>Investment Management</h1>
      <p>Sign in to your account</p>
    </div>

    <!-- Body -->
    <div class="login-body">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        
        <!-- Error Alert -->
        <div *ngIf="error" class="error-alert">
          {{ error }}
        </div>

        <!-- Username -->
        <div class="form-group">
          <label for="username">Username or Email</label>
          <input
            id="username"
            type="text"
            formControlName="username"
            class="form-input"
            [class.error]="f['username'].invalid && f['username'].touched"
            placeholder="Enter your username"
          />
          <div *ngIf="f['username'].invalid && f['username'].touched" class="error-message">
            Username is required
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input
              id="password"
              [type]="hidePassword ? 'password' : 'text'"
              formControlName="password"
              class="form-input"
              [class.error]="f['password'].invalid && f['password'].touched"
              placeholder="Enter your password"
            />
            <button
              type="button"
              class="password-toggle"
              (click)="hidePassword = !hidePassword"
            >
              <svg *ngIf="hidePassword" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg *ngIf="!hidePassword" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
          <div *ngIf="f['password'].invalid && f['password'].touched" class="error-message">
            Password is required
          </div>
        </div>

        <!-- Options -->
        <div class="form-options">
          <label class="checkbox-wrapper">
            <input type="checkbox" formControlName="rememberMe" />
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="submit-btn" [disabled]="loading || loginForm.invalid">
          <span *ngIf="loading" class="loading-spinner"></span>
          <span>{{ loading ? 'Signing in...' : 'Sign in' }}</span>
        </button>
      </form>

      <!-- Sign Up Link -->
      <div class="signup-section">
        <p>
          Don't have an account? 
          <a routerLink="/auth/register" class="signup-link">Sign up here</a>
        </p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    © 2026 Investment Management Platform. All rights reserved.
  </div>
</div>
