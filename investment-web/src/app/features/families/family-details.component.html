<div class="p-6">
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center">
      <button (click)="back()" class="mr-3 text-gray-500 hover:text-gray-700">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
        </svg>
      </button>
      <h1 class="text-2xl font-semibold text-gray-900">Family Details</h1>
    </div>
    <div *ngIf="isAdmin && family && !editing" class="space-x-2">
      <button (click)="startEdit()" class="px-4 py-2 bg-primary-600 text-white rounded-md text-sm font-medium hover:bg-primary-700">Edit</button>
      <button (click)="delete()" class="px-4 py-2 bg-red-600 text-white rounded-md text-sm font-medium hover:bg-red-700">Delete</button>
    </div>
  </div>

  <div *ngIf="error" class="p-3 mb-4 rounded bg-red-50 text-red-700 border border-red-200">{{ error }}</div>
  <div *ngIf="success" class="p-3 mb-4 rounded bg-green-50 text-green-700 border border-green-200">{{ success }}</div>

  <div *ngIf="loading" class="text-gray-600">Loading…</div>

  <div *ngIf="!loading && family" class="bg-white rounded-lg shadow border border-gray-200 p-6 space-y-4">
    <div *ngIf="!editing">
      <dl class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
        <div>
          <dt class="text-xs font-medium text-gray-500 uppercase">Family Name</dt>
          <dd class="mt-1 text-sm text-gray-900">{{ family.familyName }}</dd>
        </div>
        <div>
          <dt class="text-xs font-medium text-gray-500 uppercase">Group</dt>
          <dd class="mt-1 text-sm text-gray-900" [title]="family.groupId || ''">{{ groupDisplay() }}</dd>
        </div>
        <div>
          <dt class="text-xs font-medium text-gray-500 uppercase">Status</dt>
          <dd class="mt-1">
            <span class="inline-flex px-2 py-0.5 text-xs font-medium rounded-full" [ngClass]="{
              'bg-green-100 text-green-800': family.status === 'ACTIVE',
              'bg-gray-100 text-gray-700': family.status !== 'ACTIVE'
            }">{{ family.status || '—' }}</span>
          </dd>
        </div>
        <div>
          <dt class="text-xs font-medium text-gray-500 uppercase">Created</dt>
          <dd class="mt-1 text-sm text-gray-900">{{ family.createdDate ? (family.createdDate | date:'medium') : '—' }}</dd>
        </div>
        <div class="md:col-span-2">
          <dt class="text-xs font-medium text-gray-500 uppercase">Description</dt>
          <dd class="mt-1 text-sm text-gray-900">{{ family.description || '—' }}</dd>
        </div>
      </dl>
    </div>

    <form *ngIf="editing && isAdmin" [formGroup]="editForm" (ngSubmit)="saveEdit()" class="space-y-3">
      <div>
        <label class="block text-sm font-medium text-gray-700">Family Name *</label>
        <input formControlName="familyName" type="text" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-primary-500 focus:ring-primary-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Description</label>
        <textarea formControlName="description" rows="3" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-primary-500 focus:ring-primary-500"></textarea>
      </div>
      <div class="flex space-x-2">
        <button type="submit" [disabled]="editForm.invalid" class="px-4 py-2 bg-primary-600 text-white rounded-md text-sm font-medium hover:bg-primary-700 disabled:opacity-50">Save</button>
        <button type="button" (click)="cancelEdit()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-md text-sm font-medium hover:bg-gray-200">Cancel</button>
      </div>
    </form>
  </div>
</div>
