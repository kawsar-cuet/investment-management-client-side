<header class="bg-white shadow-md sticky top-0 z-50">
  <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16">
      <!-- Logo and Brand -->
      <div class="flex items-center">
        <div class="flex-shrink-0 flex items-center">
          <div class="h-10 w-10 bg-primary-500 rounded-lg flex items-center justify-center">
            <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
          </div>
          <span class="ml-3 text-xl font-heading font-bold text-gray-900 hidden sm:block">
            Investment Platform
          </span>
        </div>

        <!-- Desktop Navigation -->
        <div class="hidden md:ml-10 md:flex md:space-x-8">
          <a routerLink="/dashboard" routerLinkActive="border-primary-500 text-gray-900" 
             class="border-b-2 border-transparent hover:border-gray-300 text-gray-600 hover:text-gray-900 inline-flex items-center px-1 pt-1 text-sm font-medium transition">
            Dashboard
          </a>
          <a routerLink="/groups" routerLinkActive="border-primary-500 text-gray-900"
             class="border-b-2 border-transparent hover:border-gray-300 text-gray-600 hover:text-gray-900 inline-flex items-center px-1 pt-1 text-sm font-medium transition">
            Groups
          </a>
          <a routerLink="/members" routerLinkActive="border-primary-500 text-gray-900"
             class="border-b-2 border-transparent hover:border-gray-300 text-gray-600 hover:text-gray-900 inline-flex items-center px-1 pt-1 text-sm font-medium transition">
            Members
          </a>
          <a routerLink="/deposits" routerLinkActive="border-primary-500 text-gray-900"
             class="border-b-2 border-transparent hover:border-gray-300 text-gray-600 hover:text-gray-900 inline-flex items-center px-1 pt-1 text-sm font-medium transition">
            Deposits
          </a>
          <a routerLink="/reports" routerLinkActive="border-primary-500 text-gray-900"
             class="border-b-2 border-transparent hover:border-gray-300 text-gray-600 hover:text-gray-900 inline-flex items-center px-1 pt-1 text-sm font-medium transition">
            Reports
          </a>
        </div>
      </div>

      <!-- Right side actions -->
      <div class="flex items-center space-x-4">
        <!-- Notifications -->
        <button class="p-2 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition">
          <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
          </svg>
        </button>

        <!-- User Menu -->
        <div class="relative">
          <button (click)="toggleUserMenu()" class="flex items-center space-x-3 hover:bg-gray-100 rounded-lg px-3 py-2 transition">
            <div class="h-9 w-9 rounded-full bg-primary-100 flex items-center justify-center">
              <span class="text-primary-700 font-medium text-sm">
                {{ (currentUser && currentUser.username) ? currentUser.username.charAt(0).toUpperCase() : 'U' }}
              </span>
            </div>
            <span class="text-sm font-medium text-gray-700 hidden sm:block">
              {{ currentUser?.username || 'User' }}
            </span>
            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
          </button>

          <!-- Dropdown Menu -->
          <div *ngIf="showUserMenu" 
               class="absolute right-0 mt-2 w-56 rounded-lg shadow-lg bg-white ring-1 ring-black ring-opacity-5">
            <div class="py-1">
              <div class="px-4 py-3 border-b border-gray-100">
                <p class="text-sm text-gray-500">Signed in as</p>
                <p class="text-sm font-medium text-gray-900 truncate">{{ currentUser?.email || 'user@example.com' }}</p>
              </div>
              <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">
                <svg class="inline h-4 w-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
                Your Profile
              </a>
              <a routerLink="/settings" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">
                <svg class="inline h-4 w-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                Settings
              </a>
              <button (click)="logout()" class="w-full text-left px-4 py-2 text-sm text-red-700 hover:bg-red-50">
                <svg class="inline h-4 w-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                </svg>
                Sign out
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>
</header>
